stage: "07_sgo_training"
method: "sapiens_goal_optimization"

# Model ID when using AWS Bedrock (OPENAI_BASE_URL set).
# Used only for non-logprob LLM paths in this stage.
bedrock_model_id: "openai.gpt-oss-120b"

# Input/Output Artifacts
# All input artifacts should reference outputs from previous stages
input_artifacts:
  # From Stage 06: Tribe Formation
  tribe_seed_characteristics: "tribe_seed_characteristics_v3:latest"  # From 06_tribe_formation (Script 03)
  user_tribes: "user_tribes_v3:latest"  # From 06_tribe_formation (Script 02) - User to tribe mapping
  
  # From Stage 05: User Level Inference
  user_backstories: "user_backstory_v3:latest"  # From 05_user_level_inference
  
  # From Stage 04: Review Topic Classification 
  training_data_with_topics: "train_set_reviews_with_topics_v3:latest"  # From 04_review_topic_classification
  test_data_with_topics: "train_set_reviews_with_topics_v3:latest"  # From 04_review_topic_classification - For test predictions
  
  # From Stage 03: Topic Universe
  topic_universe: "topic_universe_final_v3:latest"  # From 03_topic_universe (shrink_topics script)
  
  # Optional artifacts
  category_mapping: "category_mapping_to_7_main:latest"  # Category mapping artifact (optional)
  
  # For final predictions: SGO training results (contains memory, user chars, category chars, tribe chars)
  sgo_training_results: "sgo_training_results_V3:latest"  # SGO training results artifact for final predictions (memory, characteristics)
  
  # For local prediction script (02_generate_predictions_from_local.py)
  train_set_reviews_with_merged_predictions_cleaned: "train_set_reviews_with_merged_predictions_cleaned:latest"  # Optional: if provided, uses WandB artifact instead of local file
  
# Output Artifacts (v4)
output_artifacts:
  initial_predictions: "pre_sgo_context_all_topics_v3_sample"  # Generated by 00_generate_train_predictions.py
  test_predictions: "pre_sgo_without_context_all_topics_v6"  # Generated by 00_generate_test_predictions.py

# File Patterns (for finding files within artifacts)
# These should match the actual filenames from the output artifacts of previous stages
file_patterns:
  tribe_seed_characteristics: "tribe_seed_characteristics.json"  # From 06_tribe_formation
  user_backstories: "user_overall_characteristics.json"  # From 05_user_level_inference
  training_data_with_topics: "train_set_reviews_with_topics.json"  # From 04_review_topic_classification (matches actual artifact filename)
  test_data_with_topics: "train_set_reviews_with_topics.json"  # From 04_review_topic_classification (merged output)
  topic_universe: "topic_universe.json"  # From 03_topic_universe (shrink_topics script saves as topic_universe.json)
  user_tribes: "user_tribes.json"  # From 06_tribe_formation
  category_mapping: "category_mapping.json"  # Optional artifact

# Dataset type to file pattern key mapping (configurable - can be renamed in future)
dataset_pattern_mapping:
  train: "training_data_with_topics"  # Maps dataset_type "train" to file_patterns key
  test: "test_data_with_topics"  # Maps dataset_type "test" to file_patterns key

# Prompt Configuration
prompt:
  directory: "prompts"  # Relative to stage directory
  initial_prediction: "initial_prediction_prompt.txt"  # Used for confidence mode
  initial_prediction_logprobs: "initial_prediction_prompt_logprobs.txt"  # Used for logprobs mode
  initial_prediction_enhanced: "initial_prediction_prompt_enhanced.txt"  # Enhanced version focusing on persona writing style (confidence mode)
  initial_prediction_enhanced_logprobs: "initial_prediction_prompt_enhanced_logprobs.txt"  # Enhanced version focusing on persona writing style (logprobs mode)

# Scoring Mode Configuration
scoring_mode: "logprobs"
# Enhanced Prompt Configuration
# Set to true to use enhanced prompts that focus on persona writing style and authentic voice
use_enhanced_prompt: false
# Model configuration for logprobs mode (overrides hyperparameters.model)
# These are only used when scoring_mode is "logprobs"
review_prediction_model: "gpt-5-mini"  # Model for generating review text (Step 1)
theme_prediction_model: "gpt-4o-mini"  # Model for theme classification with logprobs (Step 2)
# Bedrock model for theme classification with logprobs (used when OPENAI_BASE_URL is Bedrock)
logprobs_model_id: "openai.gpt-oss-120b"

# Schema Configuration
schema:
  version: "v4"

# Dataset Configuration
dataset_type: "train"  # "train" for initial predictions, "test" for test predictions

# Hyperparameters
hyperparameters:
  # Model configuration
  model: "o3"  # Options: "o3", "gpt-4o", "gpt-4-turbo", etc.
  min_request_interval: 0.12  # Rate limiting (seconds between requests). Adjust based on model tier
  
  # Model-specific parameters (only applied for non-o3 models)
  max_tokens: 2000  # Only used for gpt-4o, gpt-4-turbo, etc. (o3 doesn't use this)
  temperature: 0.7  # Only used for gpt-4o, gpt-4-turbo, etc. (o3 doesn't use this)
  
  # Parallel processing
  num_workers: 10  # For initial predictions generation (parallel processing)
  
  # LLM retry configuration
  max_retries: 3  # Maximum retries for LLM API calls
  num_iterations: 5
  batch_size: 5
  delta_threshold: 0.3
  weight_text_delta: 0.7
  weight_theme_delta: 0.3
  consolidation_threshold: 7
  
  # Product split
  train_ratio: 0.8
  use_product_split: false
  
  # Target cluster (for testing)
  target_cluster: "cluster_0"
  target_micro: "micro_0"

# W&B (Weights & Biases)
# artifact_type: type of artifact this stage produces when run (dataset | model | result)
collection: "Pre-SGO Predictions"
artifact_type: "model"
job_type: "predictions"
