stage: "10_simulations"
method: "backstory"

# Backstory Baseline Simulations
# Uses persona backstory to predict reviews

# Input Artifacts (from W&B)
input_artifacts:
  training_data: "train_set_with_topics_v5:latest"  # Training data with topics (from Stage 04)
  user_backstories: "user_backstory_v5:latest"  # User backstories (from Stage 05)
  topics: "topic_universe_final_sampled_v5:latest"  # Topic universe (from Stage 03)
  category_mapping: "category_mapping_to_7_main:latest"  # Category mapping (REQUIRED)

# Output Artifacts
output_artifacts:
  baseline_simulation_results: "baseline_simulation_results_v4"  # Baseline simulation results

# File Patterns (for finding files within artifacts)
file_patterns:
  training_data: "train_set_reviews_with_topics_filtered.json"
  user_backstories: "user_overall_characteristics.json"
  topics: "topic_universe.json"
  category_mapping: "category_mapping.json"

# Prompt Configuration
prompt:
  directory: "baselines/prompts"  # Relative to 10_running_simulations directory
  backstory_prompt: "backstory_prompt.txt"

# Model Configuration
models: ["o3"]  # Options: ["o3"], ["claude"], ["o3", "claude"]

# Hyperparameters
hyperparameters:
  num_workers: 10
  min_request_interval: 0.1  # Rate limiting (seconds between requests)
  max_retries: 3  # Maximum retries for LLM API calls

# W&B Collection
collection: "Simulation Results"
artifact_type: "result"

